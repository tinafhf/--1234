<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穴位图解搜索器 - 倪海厦推荐版</title>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS 用于样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // 简单的 SVG 图标组件，修复了相邻元素未包裹的语法错误
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                search: <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
                mapPin: (
                    <>
                        <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </>
                ),
                target: (
                    <>
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="6" />
                        <circle cx="12" cy="12" r="2" />
                    </>
                ),
                info: (
                    <>
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </>
                ),
                link: (
                    <>
                        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                    </>
                ),
                x: (
                    <>
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </>
                ),
                quote: (
                    <>
                        <path d="M3 21c3 0 7-1 7-8V5H3v16zm11 0c3 0 7-1 7-8V5h-7v16z" />
                    </>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const ACUPOINTS_DATA = [
            { id: 1, name: "合谷穴", alias: "虎口", location: "在大拇指和食指连接处，把手张开成虎口状，在最高点那块肉上。", effect: "专门管疼（特别是牙疼、头疼）、预防感冒。", partner: "太冲穴（这两个合称“四关”）。", niRecommendation: "倪师云：‘面口合谷收’。凡是脸上的问题，牙疼、嘴角歪，第一个就要想到合谷。", category: "手部" },
            { id: 2, name: "足三里", alias: "长寿穴", location: "膝盖骨外侧下面小坑往下四指，小腿外侧骨头边。", effect: "调理肠胃（胃痛、拉肚子、便秘）、增强免疫力。", partner: "中脘穴（专门治胃病）。", niRecommendation: "倪师认为这是‘不老穴’。常灸足三里，能引导胃气下行，是后天之本的最强补穴。", category: "腿部" },
            { id: 3, name: "内关穴", alias: "心血管保护神", location: "手腕横纹往上三指，两条大筋正中间。", effect: "止吐、心跳快、胸口闷。", partner: "公孙穴（治胃部反酸）。", niRecommendation: "倪师强调，内关配公孙是黄金组合，专门治心脏、胸部和胃部的各种气滞。", category: "手部" },
            { id: 4, name: "三阴交", alias: "妇科万能穴", location: "脚踝内侧骨头尖往上四指，骨头后边凹陷处。", effect: "调理月经、改善睡眠、缓解手脚冰凉。", partner: "足三里（补气血）。", niRecommendation: "倪师讲这是肝、脾、肾三经交会点。女性必修穴，但孕妇绝对不能重按。", category: "腿部" },
            { id: 5, name: "太冲穴", alias: "消气穴", location: "脚背大脚趾和二脚趾缝往后推到推不动处。", effect: "降火气、缓解眼干、解郁闷。", partner: "合谷穴（疏导情绪）。", niRecommendation: "倪师称之为肝经原穴。人生气时太冲会痛，按通了就像疏通了河道，火气自消。", category: "足部" },
            { id: 6, name: "风池穴", alias: "防风邪", location: "后脑勺大筋两旁凹陷处，与耳垂平齐。", effect: "治感冒流鼻涕、改善脖子酸疼、明目。", partner: "大椎穴（退烧快）。", niRecommendation: "倪师说风池是风邪最易进入处。头痛、感冒时，重掐风池能快速驱散邪气。", category: "头部" },
            { id: 7, name: "涌泉穴", alias: "肾气之源", location: "脚底板，脚趾蜷缩时最凹陷的点。", effect: "改善失眠、降血压、缓解嗓子疼。", partner: "太溪穴（一起补肾）。", niRecommendation: "倪师认为肾主骨，涌泉是肾经之头。虚火上浮（如晚上睡不着）的人，按此引火归元。", category: "足部" },
            { id: 8, name: "神门穴", alias: "安神穴", location: "手腕横纹靠近小拇指侧的凹陷处。", effect: "帮助入睡、缓解心慌不安。", partner: "内关穴（平心静气）。", niRecommendation: "倪师说神门专门调理‘神不守舍’。容易受惊、焦虑、忘事的人，多揉神门。", category: "手部" },
            { id: 9, name: "关元穴", alias: "丹田", location: "肚脐眼正下方四指距离。", effect: "补肾壮阳、缓解肚子冷痛、改善尿急。", partner: "肾俞穴（补肾翻倍）。", niRecommendation: "倪师极其推崇关元，认为是男人的命根子。艾灸关元可直接补充真元之气。", category: "躯干" },
            { id: 10, name: "印堂穴", alias: "眉心", location: "两根眉毛的正中间。", effect: "提神醒脑、治鼻塞、改善失眠。", partner: "迎香穴（治鼻炎神组合）。", niRecommendation: "倪师讲印堂是督脉要穴。揉开印堂能立刻放松神经，缓解压力。", category: "头部" }
        ];

        function App() {
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedPoint, setSelectedPoint] = useState(null);
            const [activeCategory, setActiveCategory] = useState("全部");

            const categories = ["全部", "头部", "手部", "腿部", "足部", "躯干"];

            const filteredPoints = useMemo(() => {
                return ACUPOINTS_DATA.filter(point => {
                    const matchesSearch = point.name.includes(searchTerm) || point.effect.includes(searchTerm) || point.alias.includes(searchTerm) || point.niRecommendation.includes(searchTerm);
                    const matchesCategory = activeCategory === "全部" || point.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchTerm, activeCategory]);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-[#002FA7] text-white p-6 md:p-8 shadow-xl sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto relative">
                            <h1 className="text-2xl md:text-3xl font-black tracking-tight flex items-center gap-3">
                                <Icon name="target" size={28} />
                                穴位图解搜索器
                            </h1>
                            <p className="mt-2 text-blue-100 opacity-90 text-xs md:text-sm font-medium">
                                通俗说明 · 直接功效 · 倪海厦经典点评
                            </p>
                            
                            <div className="mt-6 relative group">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={18} /></div>
                                <input
                                    type="text"
                                    placeholder="搜症状(如:头疼)、穴位、倪师点评..."
                                    className="w-full pl-12 pr-4 py-3 rounded-2xl border-none text-slate-800 shadow-2xl focus:ring-4 focus:ring-blue-400/30 outline-none"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-8">
                        {/* Categories */}
                        <div className="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
                            {categories.map(cat => (
                                <button
                                    key={cat}
                                    onClick={() => setActiveCategory(cat)}
                                    className={`px-5 py-1.5 rounded-xl text-sm font-bold whitespace-nowrap border-2 transition-all ${
                                        activeCategory === cat ? "bg-[#002FA7] text-white border-[#002FA7]" : "bg-white text-slate-500 border-transparent"
                                    }`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* List */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {filteredPoints.map(point => (
                                <div 
                                    key={point.id}
                                    onClick={() => setSelectedPoint(point)}
                                    className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:shadow-lg transition-all cursor-pointer group active:scale-[0.98]"
                                >
                                    <div className="flex justify-between items-start mb-3">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-800 group-hover:text-[#002FA7]">{point.name}</h3>
                                            <span className="text-[10px] px-2 py-0.5 bg-slate-100 text-slate-500 rounded font-bold">{point.alias}</span>
                                        </div>
                                        <span className="text-[10px] font-black text-[#002FA7] bg-blue-50 px-2 py-0.5 rounded-full">{point.category}</span>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex gap-2 text-xs text-slate-500">
                                            <Icon name="mapPin" size={14} className="text-[#002FA7]" />
                                            <p className="line-clamp-1">{point.location}</p>
                                        </div>
                                        <div className="flex gap-2 text-sm font-bold text-slate-700">
                                            <div className="w-1 h-4 bg-blue-400 rounded-full"></div>
                                            <p>{point.effect}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal */}
                    {selectedPoint && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-[32px] overflow-hidden shadow-2xl animate-fadeIn">
                                <div className="bg-[#002FA7] p-6 text-white relative">
                                    <button onClick={() => setSelectedPoint(null)} className="absolute top-4 right-4 p-2 hover:bg-white/10 rounded-full"><Icon name="x" size={24} /></button>
                                    <div className="flex items-center gap-3">
                                        <div className="bg-white/10 p-3 rounded-2xl"><Icon name="target" size={32} /></div>
                                        <div>
                                            <h2 className="text-2xl font-black">{selectedPoint.name}</h2>
                                            <p className="text-blue-200 text-xs font-bold">别名：{selectedPoint.alias}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 space-y-5 overflow-y-auto max-h-[70vh]">
                                    <section>
                                        <div className="flex items-center gap-2 mb-2 text-[#002FA7] font-black text-xs uppercase"><Icon name="mapPin" size={16} /><span>位置</span></div>
                                        <div className="bg-slate-50 p-4 rounded-2xl text-slate-700 text-sm leading-relaxed border-l-4 border-[#002FA7] font-medium">{selectedPoint.location}</div>
                                    </section>
                                    <div className="grid grid-cols-2 gap-4">
                                        <section>
                                            <div className="flex items-center gap-2 mb-1 text-emerald-600 font-black text-xs"><Icon name="info" size={16} /><span>作用</span></div>
                                            <p className="text-slate-800 font-bold text-sm">{selectedPoint.effect}</p>
                                        </section>
                                        <section>
                                            <div className="flex items-center gap-2 mb-1 text-orange-600 font-black text-xs"><Icon name="link" size={16} /><span>配合</span></div>
                                            <p className="text-slate-600 text-xs">{selectedPoint.partner}</p>
                                        </section>
                                    </div>
                                    <section className="bg-blue-50 p-5 rounded-2xl border border-blue-100 relative">
                                        <Icon name="quote" className="absolute -top-2 -left-1 text-[#002FA7] opacity-10" size={30} />
                                        <div className="text-[#002FA7] text-xs font-black mb-2">倪海厦老师推荐</div>
                                        <p className="text-[#002FA7] text-sm font-bold italic leading-relaxed">“{selectedPoint.niRecommendation}”</p>
                                    </section>
                                    <button onClick={() => setSelectedPoint(null)} className="w-full bg-[#002FA7] text-white py-4 rounded-xl font-black hover:bg-blue-800 transition-colors">我知道了</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
